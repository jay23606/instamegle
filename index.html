<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Peek</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <link rel="icon" href="icon.svg">
    <link rel="apple-touch-icon" href="icon.svg">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app"></div>
    <div id="toast" class="toast"></div>
    <div id="dmwrap"></div>
    <div id="incall"></div>
    <div id="callo">
      <div class="stagev">
        <video id="rv" autoplay playsinline></video>
        <video id="lv" autoplay muted playsinline></video>
        <div class="cstat" id="cstat"></div>
      </div>
      <div class="cbar">
        <button id="cmute" title="Mute mic" aria-label="Mute microphone">🎙️</button>
        <button id="ccam" title="Toggle camera" aria-label="Toggle camera">📷</button>
        <button class="hang" id="chang" title="Hang up" aria-label="Hang up">📵</button>
      </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
